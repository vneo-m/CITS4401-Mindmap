  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {

  .header {

    content: '';

  .legend {

  .node-header:hover {

  .node-toggle {
    width: 18px;
    height: 18px;

  .node-text {
    flex: 1;

  .node-children {

  .node-children.collapsed {
    max-height: 0 !important;
    opacity: 0;

  .level-0 > .node-header {
    background: linear-gradient(135deg, rgba(74, 144, 217, 0.12), rgba(126, 200, 227, 0.06));

  .level-0 > .node-header .node-text {

  .level-0 > .node-header .node-toggle {
    background: rgba(74, 144, 217, 0.2);

  }

  .level-1 > .node-header .node-text {
    font-weight: 500;
    color: #222222;
  }

  .level-1 > .node-header .node-toggle {
    background: rgba(74, 144, 217, 0.12);

  .level-2 > .node-header .node-text {
    color: #333333;

  }

  .level-2 > .node-header .node-toggle {

  .level-3 > .node-header .node-text {

    font-weight: 300;

  }

  .level-3 > .node-header .node-toggle {
    background: rgba(74, 144, 217, 0.05);

  }

  .leaf > .node-header .node-toggle {
    background: none;
    color: #aaaaaa;

  }

  .tag {
    display: inline-block;
    padding: 1px 7px;

  .tag-def { background: rgba(100, 60, 190, 0.09); color: #5030a0; }
  .tag-exam { background: rgba(180, 90, 0, 0.09); color: #a05010; }

    color: #2270b8;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.78em;
    font-family: 'Noto Sans SC', sans-serif;
    transition: all 0.2s;
  }

  .ctrl-btn:hover {
    background: rgba(74, 144, 217, 0.14);
    border-color: rgba(74, 144, 217, 0.4);
  }

  strong { color: #111111; font-weight: 500; }
  em { font-style: normal; color: #0a7aaa; }
  code { font-family: 'JetBrains Mono', monospace; font-size: 0.88em; background: rgba(0,0,0,0.04); padding: 1px 5px; border-radius: 3px; }

<script>
const data = {
  text: "CITS5508 Machine Learning — Lecture 3：回归模型 (Regression Models)",
  children: [
    {
      text: "一、线性回归 (Linear Regression) <span class='tag tag-exam'>考试重点</span>",
      children: [
        {
          text: "1. 模型定义 <span class='tag tag-def'>定义</span>",
          children: [
            { text: "线性模型通过计算输入特征的<strong>加权和</strong>加上一个<strong>偏置项</strong>（截距项）来做预测" },
            { text: "标量形式：<em>ŷ = θ₀ + θ₁x₁ + θ₂x₂ + ... + θₙxₙ</em> <span class='tag tag-math'>数学</span>" },
            { text: "其中 ŷ 是预测值，n 是特征数量，xᵢ 是第 i 个特征值，θⱼ 是第 j 个模型参数" },
            { text: "向量形式：<em>ŷ = h_θ(x) = θᵀx</em> <span class='tag tag-math'>数学</span>", children: [
              { text: "θ 是模型参数向量：θ = (θ₀, θ₁, …, θₙ)ᵀ，包含偏置项 θ₀ 和各特征权重" },
              { text: "x 是实例特征向量：x = (1, x₁, …, xₙ)ᵀ，注意第一个元素为 1（用于偏置项）" },
              { text: "θᵀx 是 θ 转置与 x 的矩阵乘法" },
              { text: "h_θ 是假设函数 (hypothesis function)，使用参数 θ" },
            ]},
          ]
        },
        {
          text: "2. 训练模型 — 最小化代价函数 <span class='tag tag-exam'>考试重点</span>",
          children: [
            { text: "训练模型 = 设定参数使模型<strong>最佳拟合</strong>训练集 <span class='tag tag-def'>定义</span>" },
            { text: "需要找到使代价函数 C(θ) 最小的 θ：<em>θ̂ = arg min_θ C(θ)</em> <span class='tag tag-math'>数学</span>" },
            { text: "<strong>均方误差 MSE</strong>：MSE(X, h_θ) = (1/m) Σᵢ (θᵀx⁽ⁱ⁾ − y⁽ⁱ⁾)² <span class='tag tag-math'>数学</span>", children: [
              { text: "m 是训练样本数量" },
              { text: "对大误差惩罚更重（平方放大了误差）" },
            ]},
            { text: "<strong>残差平方和 RSS</strong>：RSS(X, h_θ) = Σᵢ (θᵀx⁽ⁱ⁾ − y⁽ⁱ⁾)² <span class='tag tag-math'>数学</span>", children: [
              { text: "RSS = m × MSE，两者最小化结果等价" },
            ]},
          ]
        },
        {
          text: "3. 正规方程 (Normal Equation) — 闭式解 <span class='tag tag-exam'>考试重点</span>",
          children: [
            { text: "RSS 的矩阵形式：RSS = ‖y − Xθ‖² = (y − Xθ)ᵀ(y − Xθ) <span class='tag tag-math'>数学</span>" },
            { text: "对 θ 求导：∂RSS/∂θ = −2Xᵀ(y − Xθ) <span class='tag tag-math'>数学</span>" },
            { text: "令导数为零：Xᵀ(y − Xθ) = 0 <span class='tag tag-math'>数学</span>" },
            { text: "<strong>正规方程</strong>：<em>θ̂ = (XᵀX)⁻¹ Xᵀy</em> <span class='tag tag-math'>数学</span><span class='tag tag-exam'>考试重点</span>", children: [
              { text: "X 是 m × (n+1) 矩阵，第 i 行是训练实例 x⁽ⁱ⁾" },
              { text: "θ̂ 是使代价函数最小化的参数值" },
              { text: "y 是目标值向量，包含 y⁽¹⁾ 到 y⁽ᵐ⁾" },
            ]},
            { text: "预测：已知 θ̂ 后，对新测试实例 x_test 预测 <em>y_test = θ̂ᵀ x_test</em>" },
            { text: "计算复杂度：对特征数 n 是<strong>立方</strong>级（矩阵求逆），对样本数 m 是线性级 <span class='tag tag-tip'>建议</span>" },
          ]
        },
        {
          text: "4. 代码示例 <span class='tag tag-code'>代码</span>",
          children: [
            { text: "生成随机数据：<code>X = 2 * np.random.rand(100, 1)</code>，<code>y = 4 + 3 * X + np.random.randn(100, 1)</code> <span class='tag tag-case'>案例</span>" },
            { text: "手动实现正规方程 <span class='tag tag-code'>代码</span>：", children: [
              { text: "<code>X_b = np.c_[np.ones((100, 1)), X]</code> — 给每个实例添加 x₀ = 1" },
              { text: "<code>theta_best = np.linalg.inv(X_b.T @ X_b) @ X_b.T @ y</code>" },
              { text: "结果 θ₀ ≈ 4.215, θ₁ ≈ 2.770（接近真实值 4 和 3）<span class='tag tag-data'>数据</span>" },
            ]},
            { text: "Scikit-Learn 实现 <span class='tag tag-code'>代码</span>：", children: [
              { text: "<code>from sklearn.linear_model import LinearRegression</code>" },
              { text: "<code>lin_reg = LinearRegression(); lin_reg.fit(X, y)</code>" },
              { text: "<code>lin_reg.intercept_</code> 和 <code>lin_reg.coef_</code> 获取参数" },
              { text: "Scikit-Learn 内部使用 <strong>SVD（奇异值分解）</strong>求解，数值更稳定 <span class='tag tag-tip'>建议</span>" },
            ]},
          ]
        },
      ]
    },
    {
      text: "二、梯度下降 (Gradient Descent) <span class='tag tag-exam'>考试重点</span>",
      children: [
        {
          text: "1. 基本思想 <span class='tag tag-def'>定义</span>",
          children: [
            { text: "一种非常通用的<strong>优化算法</strong>，通过迭代调整参数来最小化代价函数" },
            { text: "核心思路：测量误差函数关于参数向量 θ 的<strong>局部梯度</strong>，沿梯度下降方向前进" },
            { text: "初始化：用<strong>随机值</strong>填充 θ（随机初始化）" },
            { text: "迭代改进：每一步尝试减小代价函数（如 MSE），直到算法<strong>收敛到最小值</strong>" },
            { text: "当梯度为零时，达到一个（局部）极小值" },
          ]
        },
        {
          text: "2. 偏导数与梯度向量 <span class='tag tag-math'>数学</span>",
          children: [
            { text: "偏导数：计算代价函数关于每个参数 θⱼ 的变化率 <span class='tag tag-def'>定义</span>" },
            { text: "MSE 关于 θⱼ 的偏导：<em>∂MSE(θ)/∂θⱼ = (2/m) Σᵢ (θᵀx⁽ⁱ⁾ − y⁽ⁱ⁾) xⱼ⁽ⁱ⁾</em> <span class='tag tag-math'>数学</span>" },
            { text: "梯度向量包含所有偏导数：<em>∇_θ MSE(θ) = (2/m) Xᵀ(Xθ − y)</em> <span class='tag tag-math'>数学</span><span class='tag tag-exam'>考试重点</span>" },
            { text: "直觉理解 <span class='tag tag-tip'>建议</span>：", children: [
              { text: "当 ∂f/∂z < 0 时（在当前点函数值在下降），z 需要增大以接近最小值" },
              { text: "当 ∂f/∂z > 0 时（在当前点函数值在上升），z 需要减小以接近最小值" },
              { text: "因此更新方向为梯度的<strong>负方向</strong>" },
            ]},
          ]
        },
        {
          text: "3. 梯度下降更新步骤 <span class='tag tag-exam'>考试重点</span>",
          children: [
            { text: "<strong>更新公式</strong>：<em>θ⁽ᵗ⁺¹⁾ = θ⁽ᵗ⁾ − η ∇_θ MSE(θ⁽ᵗ⁾)</em> <span class='tag tag-math'>数学</span>" },
            { text: "θ⁽ᵗ⁾ 是上一步的参数值，θ⁽ᵗ⁺¹⁾ 是新的参数值" },
            { text: "η (eta) 是<strong>学习率</strong>（步长），是一个超参数 <span class='tag tag-def'>定义</span>" },
          ]
        },
        {
          text: "4. 学习率的影响 <span class='tag tag-exam'>考试重点</span>",
          children: [
            { text: "学习率<strong>太小</strong>（如 η=0.02）：收敛非常慢，需要很多迭代 <span class='tag tag-tip'>建议</span>" },
            { text: "学习率<strong>适中</strong>（如 η=0.1）：正常收敛到最小值" },
            { text: "学习率<strong>太大</strong>（如 η=0.5）：算法<strong>发散</strong>，来回跳跃，越跑越远 <span class='tag tag-tip'>建议</span>" },
          ]
        },
        {
          text: "5. 梯度下降的陷阱 <span class='tag tag-exam'>考试重点</span>",
          children: [
            { text: "<strong>局部最小值 (Local Minimum)</strong>：梯度下降可能停在局部最小值而非全局最小值 <span class='tag tag-def'>定义</span>" },
            { text: "<strong>平台 (Plateau)</strong>：梯度接近零的平坦区域，导致收敛极慢 <span class='tag tag-def'>定义</span>" },
            { text: "好消息：MSE 代价函数是<strong>凸函数</strong>（碗形），只有一个全局最小值 <span class='tag tag-tip'>建议</span>" },
            { text: "但如果特征尺度不同，碗可能被拉伸为<strong>椭球</strong>，收敛会更慢", children: [
              { text: "因此使用梯度下降前应<strong>标准化特征</strong>（Feature Scaling）<span class='tag tag-tip'>建议</span>" },
            ]},
          ]
        },
        {
          text: "6. 批量梯度下降 (Batch GD) 实现 <span class='tag tag-code'>代码</span>",
          children: [
            { text: "<code>eta = 0.1</code>，<code>n_epochs = 1000</code>" },
            { text: "每次迭代使用<strong>全部训练集</strong>计算梯度：<code>gradients = 2/m * X_b.T @ (X_b @ theta - y)</code>" },
            { text: "更新参数：<code>theta = theta - eta * gradients</code>" },
            { text: "结果与正规方程一致：θ₀ ≈ 4.215, θ₁ ≈ 2.770 <span class='tag tag-data'>数据</span>" },
          ]
        },
        {
          text: "7. 三种梯度下降变体 <span class='tag tag-exam'>考试重点</span>",
          children: [
            { text: "<strong>批量梯度下降 (Batch GD)</strong> <span class='tag tag-def'>定义</span>：", children: [
              { text: "每一步使用<em>完整训练集</em>计算梯度" },
              { text: "训练集大时非常慢" },
              { text: "路径平滑，直接走向最小值" },
            ]},
            { text: "<strong>随机梯度下降 (Stochastic GD / SGD)</strong> <span class='tag tag-def'>定义</span>：", children: [
              { text: "每一步随机选<em>一个实例</em>计算梯度" },
              { text: "速度快，可处理大规模数据集" },
              { text: "路径跳跃不规则，但平均方向趋向最小值" },
              { text: "可能跳出局部最小值（优点），但最终不会精确收敛（缺点）" },
              { text: "解决方案：<strong>逐渐降低学习率</strong>（学习率调度），让算法最终稳定 <span class='tag tag-tip'>建议</span>" },
            ]},
            { text: "<strong>小批量梯度下降 (Mini-batch GD)</strong> <span class='tag tag-def'>定义</span>：", children: [
              { text: "每一步使用<em>小批量随机样本</em>（mini-batch）计算梯度" },
              { text: "利用硬件矩阵运算优化（如向量化、GPU 加速）获得性能提升" },
              { text: "路径比 SGD 更平滑，但比 Batch GD 更有噪声" },
            ]},
          ]
        },
        {
          text: "8. SGD 学习率调度示例 <span class='tag tag-code'>代码</span>",
          children: [
            { text: "使用学习率调度函数：<code>learning_schedule(t) = t0 / (t + t1)</code>" },
            { text: "t0、t1 是超参数（示例中 t0=5, t1=50）" },
            { text: "随着迭代次数增加，学习率逐步减小" },
            { text: "每个 epoch 内遍历 m 个样本，每次随机选一个进行更新" },
          ]
        },
        {
          text: "9. 方法对比总结 <span class='tag tag-exam'>考试重点</span>",
          children: [
            { text: "<strong>正规方程</strong>：大 m 快，大 n 慢，无超参数，无需缩放 <span class='tag tag-data'>数据</span>" },
            { text: "<strong>SVD</strong>：大 m 快，大 n 慢，无超参数，无需缩放；Scikit-Learn 的 LinearRegression 使用此方法" },
            { text: "<strong>Batch GD</strong>：大 m 慢，大 n 快，2 个超参数（η, 迭代数），需要缩放" },
            { text: "<strong>SGD</strong>：大 m 快，大 n 快，≥2 个超参数，需要缩放；Scikit-Learn: SGDRegressor" },
            { text: "<strong>Mini-batch GD</strong>：大 m 快，大 n 快，≥2 个超参数，需要缩放" },
            { text: "超参数包括：学习率 η、迭代次数、批量大小、动量等" },
          ]
        },
      ]
    },
    {
      text: "三、多项式回归 (Polynomial Regression) <span class='tag tag-exam'>考试重点</span>",
      children: [
        {
          text: "1. 动机：非线性数据 <span class='tag tag-case'>案例</span>",
          children: [
            { text: "当数据比直线更复杂时，线性回归效果不好" },
            { text: "示例数据：<em>y = 0.5x₁² + x₁ + 2 + ε</em>，其中 ε ~ N(0,1) <span class='tag tag-data'>数据</span>" },
            { text: "数据呈抛物线形状，无法用直线拟合" },
          ]
        },
        {
          text: "2. 核心思想 <span class='tag tag-def'>定义</span>",
          children: [
            { text: "引入新特征：将原始特征的<strong>高次幂</strong>作为新特征加入模型" },
            { text: "例如 degree=2：将 x₁ 扩展为 [x₁, x₁²]，然后用<strong>线性回归</strong>来拟合" },
            { text: "模型本身对参数仍然是线性的，但对原始特征是非线性的 <span class='tag tag-tip'>建议</span>" },
          ]

function createNode(item, level) {
  const node = document.createElement('div');
  const hasChildren = item.children && item.children.length > 0;
  node.className = `node level-${level}` + (hasChildren ? '' : ' leaf');

  const header = document.createElement('div');
  header.className = 'node-header';

  const toggle = document.createElement('span');
  toggle.className = 'node-toggle';
  toggle.innerHTML = hasChildren ? '−' : '•';

  const text = document.createElement('span');
  text.className = 'node-text';
  text.innerHTML = item.text;

  header.appendChild(toggle);
  header.appendChild(text);
  node.appendChild(header);

  if (hasChildren) {
    const childrenDiv = document.createElement('div');
    childrenDiv.className = 'node-children';
    item.children.forEach(child => {
      childrenDiv.appendChild(createNode(child, level + 1));
    });
    node.appendChild(childrenDiv);

    header.addEventListener('click', () => {
      const isCollapsed = childrenDiv.classList.contains('collapsed');
      if (isCollapsed) {
        childrenDiv.classList.remove('collapsed');
        childrenDiv.style.maxHeight = childrenDiv.scrollHeight + 'px';
        toggle.innerHTML = '−';
        setTimeout(() => { childrenDiv.style.maxHeight = 'none'; }, 350);
      } else {
        childrenDiv.style.maxHeight = childrenDiv.scrollHeight + 'px';
        requestAnimationFrame(() => {
          childrenDiv.classList.add('collapsed');
          childrenDiv.style.maxHeight = '0';
        });
        toggle.innerHTML = '+';
      }
    });
  }

  return node;
}

const tree = document.getElementById('tree');
data.children.forEach(child => {
  tree.appendChild(createNode(child, 0));
});

function toggleAll(expand) {
  document.querySelectorAll('.node-children').forEach(el => {
    if (expand) {
      el.classList.remove('collapsed');
      el.style.maxHeight = 'none';
      el.previousElementSibling.querySelector('.node-toggle').innerHTML = '−';
    } else {
      el.classList.add('collapsed');
      el.style.maxHeight = '0';
      el.previousElementSibling.querySelector('.node-toggle').innerHTML = '+';
    }
  });
}

function expandLevel(level) {
  document.querySelectorAll(`.level-${level}`).forEach(node => {
    const children = node.querySelector('.node-children');
    if (children) {
      children.classList.remove('collapsed');
      children.style.maxHeight = 'none';
      node.querySelector('.node-toggle').innerHTML = '−';
    }
  });
}
